services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: master123
      POSTGRES_DB: whaticket
      TZ: America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ramelnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - ramelnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  backend:
    image: ramel/whaticket_papi-backend:codex-v11
    environment:
      TZ: America/Sao_Paulo
      NODE_ENV: production
      PORT: "8081"
      PROXY_PORT: "443"
      BACKEND_URL: https://apichat.ramelseg.com.br
      FRONTEND_URL: https://chat.ramelseg.com.br
      DB_DIALECT: postgres
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: whaticket
      DB_USER: postgres
      DB_PASS: master123
      REDIS_URI: redis://redis:6379
      REDIS_OPT_LIMITER_MAX: "1"
      REDIS_OPT_LIMITER_DURATION: "3000"
      JWT_SECRET: change-me-jwt-secret
      JWT_REFRESH_SECRET: change-me-refresh-secret
      MASTER_KEY: change-me-master-key
      COMPANY_TOKEN: whaticket
      VERIFY_TOKEN: whaticket
      CERTIFICADOS: "false"
      HTTPS: "false"
      SSL_CRT_FILE: /app/certs/fullchain.pem
      SSL_KEY_FILE: /app/certs/privkey.pem
      FACEBOOK_APP_ID: ""
      FACEBOOK_APP_SECRET: ""
      MAIL_HOST: ""
      MAIL_USER: ""
      MAIL_PASS: ""
      MAIL_FROM: ""
      MAIL_PORT: ""
      STRIPE_PRIVATE: ""
      STRIPE_OK_URL: ""
      STRIPE_CANCEL_URL: ""
      MP_ACCESS_TOKEN: ""
      MP_NOTIFICATION_URL: ""
      ASAAS_TOKEN: ""
      GERENCIANET_SANDBOX: "false"
      GERENCIANET_CLIENT_ID: ""
      GERENCIANET_CLIENT_SECRET: ""
      GERENCIANET_PIX_CERT: ""
      GERENCIANET_PIX_KEY: ""
      OPENAI_API_KEY: ""
      SENTRY_DSN: ""
      BULL_BOARD: "false"
      BULL_USER: admin
      BULL_PASS: admin
    volumes:
      - backend_public:/app/public
      - backend_private:/app/private
      - backend_certs:/app/certs
    networks:
      - ramelnet
    command:
      - /bin/bash
      - -lc
      - |
        until nc -z postgres 5432; do
          echo "Waiting for postgres..."
          sleep 3
        done

        until nc -z redis 6379; do
          echo "Waiting for redis..."
          sleep 3
        done

        npx sequelize db:migrate
        node dist/server.js
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:' + (process.env.PORT || 8081), r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  frontend:
    image: ramel/whaticket_papi-frontend:codex-v11
    networks:
      - ramelnet
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any

networks:
  ramelnet:
    driver: overlay
    attachable: true

volumes:
  postgres_data:
  redis_data:
  backend_public:
  backend_private:
  backend_certs:
